<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Soft Accent Gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="260" fill="url(#bg)"/>

  <!-- Subtle Floating Circles -->
  <circle cx="200" cy="200" r="3" fill="#94a3b8" opacity="0.3">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -20; 0 0" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="800" cy="180" r="2" fill="#cbd5f5" opacity="0.25">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -15; 0 0" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1000" cy="220" r="2.5" fill="#94a3b8" opacity="0.2">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -25; 0 0" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Main Name -->
  <text x="50%" y="45%" text-anchor="middle"
        font-size="42" font-family="Segoe UI, sans-serif"
        fill="white" font-weight="600">
    Abhiraj Kumar
  </text>

  <!-- Underline Accent -->
  <rect x="420" y="135" width="360" height="2" fill="url(#accent)">
    <animate attributeName="width" values="0;360" dur="1.2s" fill="freeze"/>
  </rect>

  <!-- Subtitle -->
  <text x="50%" y="60%" text-anchor="middle"
        font-size="18" font-family="Segoe UI, sans-serif"
        fill="#cbd5f5">
    Full Stack Developer • AI/ML Engineer
  </text>

  <!-- Soft Fade In -->
  <animate attributeName="opacity" from="0" to="1" dur="1.2s" fill="freeze"/>

</svg>
